name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RELEASE_VERSION: ${{ github.ref_name }}
      RELEASE_ARCHIVE: cuckooremind-${{ github.ref_name }}.zip
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Create ZIP
        run: bash bin/make-zip.sh

      - name: Rename ZIP with tag name
        run: mv cuckooremind.zip "$RELEASE_ARCHIVE"

      - name: Verify release package
        run: |
          unzip -p "$RELEASE_ARCHIVE" update-manifest.json > manifest.json
          test "$(jq -r .version manifest.json)" = "$RELEASE_VERSION"
          unzip -l "$RELEASE_ARCHIVE" | grep -q 'update-manifest.json'
          ! unzip -l "$RELEASE_ARCHIVE" | grep -qE '(^|/)[.]git/'
          php scripts/verify-release-package.php "$RELEASE_ARCHIVE" "$RELEASE_VERSION"
          sha256sum "$RELEASE_ARCHIVE" > checksums.txt

      - name: Smoke test new installation
        run: |
          install_dir=$(mktemp -d)
          unzip -q "$RELEASE_ARCHIVE" -d "$install_dir"
          cd "$install_dir"
          php artisan migrate:status
          php artisan about --only=environment

      - name: Smoke test upgrades from supported legacy releases
        run: |
          bash scripts/smoke-test-upgrade.sh "$RELEASE_ARCHIVE" "$RELEASE_VERSION" https://github.com/ytsuyuzaki/cuckooremind/releases/download/v0.0.1/cuckooremind.zip
          bash scripts/smoke-test-upgrade.sh "$RELEASE_ARCHIVE" "$RELEASE_VERSION" https://github.com/ytsuyuzaki/cuckooremind/releases/download/v0.0.2/cuckooremind-v0.0.2.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.RELEASE_ARCHIVE }}
            checksums.txt
